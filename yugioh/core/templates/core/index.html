{% extends 'layout.html' %}

{% block title %}
  {{title}}
{% endblock %}

{% block content %}
  <div class="container mt-3">
    <h1>{{title}}</h1>
    <hr>
    <div class="row">
      {% for card in cards %} 
        <div class="col-lg-3">
          <div class="card mt-4 card-yugioh"> <a href="{{url_for('views.detail', id=card.id)}}">
              <img src="{{card.img_url}}" alt="{{card.name}}" class="card-img-top bg-secondary">
            </a>
            <div class="card-body">
              <h2 class="text-primary">{{card.name}}</h2> {% for type in card.types %}
                <a href="#" class="btn btn-outline-dark btn-sm">
                  {{type.name}}
                </a>
              {% endfor %}
              
            </div>
          </div>
        </div>
      {% endfor %}
      
    </div>
    <br>
    {% include "core/pagination.html" %}
  </div>
{% endblock %}
